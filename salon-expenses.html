<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>経費管理 | 燈乃工房</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #fafafa; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #f9a8d4, #c084fc); padding: 20px; color: #fff; }
  .header .sub { font-size: 11px; font-weight: 600; letter-spacing: 2px; opacity: 0.85; margin-bottom: 4px; }
  .header h1 { font-size: 22px; font-weight: 800; }
  .header .desc { font-size: 12px; opacity: 0.9; margin-top: 2px; }
  .tabs { display: flex; background: #fff; border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; z-index: 10; }
  .tab { flex: 1; padding: 12px 0; border: none; background: none; cursor: pointer; font-size: 13px; color: #888; border-bottom: 2.5px solid transparent; font-family: inherit; }
  .tab.active { font-weight: 700; color: #be185d; border-bottom-color: #ec4899; }
  .content { padding: 16px; max-width: 480px; margin: 0 auto; display: none; }
  .content.active { display: block; }
  .filter-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .filter-row input, .filter-row select { flex: 1; padding: 8px 10px; border: 1px solid #e5e7eb; border-radius: 10px; font-size: 13px; background: #fff; font-family: inherit; }
  .card { background: #fff; border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .badge { padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; white-space: nowrap; }
  .badge-本店 { background: #fce7f3; color: #be185d; }
  .badge-2号店 { background: #ede9fe; color: #6d28d9; }
  .badge-共通 { background: #e0f2fe; color: #0369a1; }
  .amount { font-weight: 800; font-size: 16px; color: #111; }
  .category { margin-top: 6px; font-size: 13px; color: #374151; font-weight: 600; }
  .card-footer { display: flex; justify-content: space-between; margin-top: 4px; align-items: center; }
  .memo { font-size: 12px; color: #9ca3af; }
  .payment-badge { font-size: 11px; color: #c4b5fd; background: #f5f3ff; padding: 1px 8px; border-radius: 8px; }
  .btn-row { display: flex; gap: 8px; margin-top: 10px; }
  .btn-edit { flex: 1; padding: 7px; border-radius: 8px; border: 1.5px solid #e5e7eb; background: #fff; color: #6b7280; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .btn-delete { flex: 1; padding: 7px; border-radius: 8px; border: 1.5px solid #fecaca; background: #fff5f5; color: #ef4444; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .total-card { background: linear-gradient(135deg, #fce7f3, #ede9fe); border-radius: 14px; padding: 16px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: flex-start; }
  .total-label { font-size: 12px; color: #6b7280; margin-bottom: 4px; }
  .total-amount { font-size: 26px; font-weight: 800; color: #be185d; }
  .diff-label { font-size: 11px; color: #6b7280; margin-bottom: 4px; text-align: right; }
  .diff-amount { font-size: 18px; font-weight: 800; text-align: right; }
  .diff-pct { font-size: 11px; font-weight: 600; text-align: right; }
  .prev-info { margin-top: 10px; font-size: 11px; color: #9ca3af; }
  .section-card { background: #fff; border-radius: 14px; padding: 14px 16px; margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .section-title { font-size: 13px; font-weight: 700; color: #374151; margin-bottom: 12px; }
  .store-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .store-total { font-weight: 700; font-size: 15px; }
  .divider { border-top: 1px solid #f0f0f0; margin: 8px 0; padding-top: 8px; display: flex; justify-content: space-between; }
  .grand-total { font-weight: 800; font-size: 16px; color: #be185d; }
  .chart-wrap { position: relative; height: 200px; margin-bottom: 4px; }
  .store-legend { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .legend-row { display: flex; align-items: center; justify-content: space-between; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
  .legend-left { display: flex; align-items: center; }
  .legend-right { display: flex; align-items: center; gap: 8px; }
  .legend-pct { font-size: 12px; color: #9ca3af; }
  .legend-val { font-weight: 700; font-size: 14px; }
  .pdf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; }
  .btn-pdf { padding: 10px; border-radius: 10px; border: 1.5px solid #f9a8d4; background: #fff; color: #be185d; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .form-card { background: #fff; border-radius: 14px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .form-label { font-size: 12px; color: #6b7280; margin-bottom: 4px; font-weight: 600; }
  .form-group { margin-bottom: 14px; }
  .form-input { width: 100%; padding: 10px 12px; border: 1px solid #e5e7eb; border-radius: 10px; font-size: 14px; font-family: inherit; }
  .btn-save { width: 100%; padding: 14px; border-radius: 12px; border: none; background: linear-gradient(135deg, #f9a8d4, #c084fc); color: #fff; font-size: 15px; font-weight: 800; cursor: pointer; font-family: inherit; margin-top: 4px; }
  .toast { background: #dcfce7; color: #16a34a; border-radius: 10px; padding: 10px 14px; margin-bottom: 14px; font-size: 13px; font-weight: 600; text-align: center; display: none; }
  .toast.error { background: #fee2e2; color: #dc2626; }
  .empty { text-align: center; color: #aaa; padding: 32px; font-size: 14px; }
  .loading { text-align: center; color: #9ca3af; padding: 20px; font-size: 13px; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: none; align-items: center; justify-content: center; padding: 24px; }
  .modal-overlay.active { display: flex; }
  .modal { background: #fff; border-radius: 18px; padding: 24px; width: 100%; max-width: 340px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
  .modal-title { font-size: 16px; font-weight: 800; text-align: center; margin-bottom: 8px; }
  .modal-sub { font-size: 13px; color: #6b7280; text-align: center; margin-bottom: 20px; }
  .modal-btns { display: flex; gap: 10px; }
  .btn-cancel { flex: 1; padding: 12px; border-radius: 10px; border: 1.5px solid #e5e7eb; background: #fff; color: #374151; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .btn-confirm-delete { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #ef4444; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .edit-sheet { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: none; align-items: flex-end; justify-content: center; }
  .edit-sheet.active { display: flex; }
  .edit-inner { background: #fff; border-radius: 18px 18px 0 0; padding: 20px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
  .edit-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .edit-title { font-size: 16px; font-weight: 800; }
  .btn-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #9ca3af; }
  .date-meta { font-size: 11px; color: #9ca3af; }
</style>
</head>
<body>

</div>

    </div>
    <div class="form-group">
      <div class="form-label">カテゴリ</div>

    <div class="form-group">
      <div class="form-label">支払方法</div>
      <select id="e-payment" class="form-input">

      </select>

      <div class="form-label">メモ</div>

<script>
const SUPABASE_URL = 'https://mdqzseflgmesziiwhdif.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1kcXpzZWZsZ21lc3ppaXdoZGlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NjYzMzgsImV4cCI6MjA5NjA0MjMzOH0.f8xnZ-dxxbg-PY6Ev-5sOi_EyoV3FHfaybSWyR3rZ-4';
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxLgU9etuz4aaD_BKhSVoYQGzFS3PCKWnDuhNB-6UTtasQku_fgp5SVAU34jYau3aMYFw/exec';

const STORE_COLORS = { '本店': '#ec4899', '2号店': '#8b5cf6', '共通': '#0ea5e9' };
const CATEGORIES = ['材料・仕入れ','固定費','人件費','広告費','備品・消耗品','研修・セミナー','その他'];

let deleteTargetId = null;
let editTargetId = null;
let pieChartInst = null, barChartInst = null, lineChartInst = null;

function yen(n) { return '¥' + Number(n).toLocaleString(); }

async function api(method, path, body) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Accept': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : (method === 'GET' ? undefined : 'return=minimal')
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (method === 'GET') return res.json();
  return res;
}

function getLastDay(ym) {
  const [y, m] = ym.split('-').map(Number);
  return new Date(y, m, 0).getDate();
}

function getPrevMonth(ym) {
  const [y, m] = ym.split('-').map(Number);
  const d = new Date(y, m - 2, 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['list','summary','add'][i] === name);
  });
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'list') loadList();
  if (name === 'summary') loadSummary();
}

async function loadList() {
  const month = document.getElementById('list-month').value;
  const store = document.getElementById('list-store').value;
  document.getElementById('list-loading').style.display = 'block';
  document.getElementById('list-items').innerHTML = '';

  let query = `expenses?date=gte.${month}-01&date=lte.${month}-${String(getLastDay(month)).padStart(2,'0')}&order=date.desc`;
  if (store) query += `&store=eq.${encodeURIComponent(store)}`;

  const data = await api('GET', query);
  document.getElementById('list-loading').style.display = 'none';

  const total = data.reduce((s, e) => s + e.amount, 0);
  const [y, m] = month.split('-');
  document.getElementById('list-month-label').textContent = `${y}年${Number(m)}月 合計`;
  document.getElementById('list-total').textContent = yen(total);

  if (!data.length) {
    document.getElementById('list-items').innerHTML = '<div class="empty">データがありません</div>';
    return;
  }

  document.getElementById('list-items').innerHTML = data.map(e => `
    <div class="card">
      <div class="card-header">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <span class="badge badge-${e.store}">${e.store}</span>
          <span class="date-meta">${e.date}</span>
        </div>
        <div class="amount">${yen(e.amount)}</div>
      </div>
      <div class="category">${e.category}</div>
      <div class="card-footer">
        <span class="memo">${e.memo || ''}</span>
        <span class="payment-badge">${e.payment_method}</span>
      </div>
      <div class="btn-row">
        <button class="btn-edit" onclick="openEdit('${e.id}','${e.date}','${e.store}','${e.category}',${e.amount},'${e.payment_method}','${(e.memo||'').replace(/'/g,"\\'")}')">✏️ 編集</button>
        <button class="btn-delete" onclick="openDeleteModal('${e.id}')">🗑️ 削除</button>
      </div>
    </div>
  `).join('');
}

async function loadSummary() {
  const month = document.getElementById('sum-month').value;
  const store = document.getElementById('sum-store').value;
  const prev = getPrevMonth(month);
  const [y, m] = month.split('-');
  document.getElementById('sum-month-label').textContent = `${y}年${Number(m)}月 合計`;

  let q = `expenses?date=gte.${month}-01&date=lte.${month}-${String(getLastDay(month)).padStart(2,'0')}&order=date.desc`;
  if (store) q += `&store=eq.${encodeURIComponent(store)}`;
  let qp = `expenses?date=gte.${prev}-01&date=lte.${prev}-${String(getLastDay(prev)).padStart(2,'0')}`;
  if (store) qp += `&store=eq.${encodeURIComponent(store)}`;
  let q6 = `expenses?date=gte.${getMonthsAgo(month,5)}-01&date=lte.${month}-${String(getLastDay(month)).padStart(2,'0')}&order=date.desc`;
  if (store) q6 += `&store=eq.${encodeURIComponent(store)}`;
  let qAll = `expenses?date=gte.${month}-01&date=lte.${month}-${String(getLastDay(month)).padStart(2,'0')}&order=date.desc`;

  const [curr, prevData, trend, allStores] = await Promise.all([
    api('GET', q), api('GET', qp), api('GET', q6), api('GET', qAll)
  ]);

  const total = curr.reduce((s,e) => s+e.amount, 0);
  const prevTotal = prevData.reduce((s,e) => s+e.amount, 0);
  const diff = total - prevTotal;
  const pct = prevTotal > 0 ? Math.round(diff/prevTotal*100) : null;

  document.getElementById('sum-total').textContent = yen(total);

  const diffEl = document.getElementById('diff-amount');
  const pctEl = document.getElementById('diff-pct');
  if (prevTotal === 0) {
    diffEl.textContent = 'データなし';
    diffEl.style.color = '#9ca3af';
    pctEl.textContent = '';
  } else {
    const color = diff > 0 ? '#ef4444' : diff < 0 ? '#10b981' : '#6b7280';
    diffEl.textContent = (diff > 0 ? '▲' : diff < 0 ? '▼' : '') + yen(Math.abs(diff));
    diffEl.style.color = color;
    pctEl.textContent = pct !== null ? (diff > 0 ? '+' : '') + pct + '%' : '';
    pctEl.style.color = color;
  }
  const [py, pm] = prev.split('-');
  document.getElementById('prev-info').textContent = `前月（${py}年${Number(pm)}月）：${yen(prevTotal)}`;

  // 店舗別ドーナツ
  const storeData = ['本店','2号店','共通'].map(s => ({
    name: s,
    val: allStores.filter(e => e.store === s).reduce((sum,e) => sum+e.amount, 0)
  })).filter(x => x.val > 0);
  const storeTotal = storeData.reduce((s,x) => s+x.val, 0);

  if (pieChartInst) pieChartInst.destroy();
  pieChartInst = new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: {
      labels: storeData.map(x => x.name),
      datasets: [{ data: storeData.map(x => x.val), backgroundColor: storeData.map(x => STORE_COLORS[x.name]), borderWidth: 2 }]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
  });
  document.getElementById('store-legend').innerHTML = storeData.map(x => {
    const pct = storeTotal > 0 ? Math.round(x.val/storeTotal*100) : 0;
    return `<div class="legend-row">
      <div class="legend-left">
        <div class="legend-dot" style="background:${STORE_COLORS[x.name]}"></div>
        <span class="badge badge-${x.name}">${x.name}</span>
      </div>
      <div class="legend-right">
        <span class="legend-pct">${pct}%</span>
        <span class="legend-val">${yen(x.val)}</span>
      </div>
    </div>`;
  }).join('');

  // カテゴリ別棒グラフ
  const catData = CATEGORIES.map(c => curr.filter(e => e.category === c).reduce((s,e) => s+e.amount, 0));
  const catLabels = CATEGORIES.map(c => c.length > 5 ? c.slice(0,4)+'…' : c);
  if (barChartInst) barChartInst.destroy();
  barChartInst = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels: catLabels,
      datasets: [{ data: catData, backgroundColor: 'rgba(249,168,212,0.8)', borderColor: '#c084fc', borderWidth: 1, borderRadius: 6 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => yen(ctx.raw) } } },
      scales: { y: { ticks: { callback: v => v >= 10000 ? v/10000+'万' : v, font: { size: 10 } } }, x: { ticks: { font: { size: 10 } } } }
    }
  });

  // 月別折れ線
  const months6 = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(parseInt(y), parseInt(m)-1-i, 1);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    months6.push({
      label: `${d.getMonth()+1}月`,
      val: trend.filter(e => e.date.startsWith(key)).reduce((s,e) => s+e.amount, 0)
    });
  }
  if (lineChartInst) lineChartInst.destroy();
  lineChartInst = new Chart(document.getElementById('lineChart'), {
    type: 'line',
    data: {
      labels: months6.map(x => x.label),
      datasets: [{ data: months6.map(x => x.val), borderColor: '#ec4899', backgroundColor: 'rgba(249,168,212,0.1)', borderWidth: 2.5, pointBackgroundColor: '#ec4899', pointRadius: 4, tension: 0.3, fill: true }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => yen(ctx.raw) } } },
      scales: { y: { ticks: { callback: v => v >= 10000 ? v/10000+'万' : v, font: { size: 10 } } }, x: { ticks: { font: { size: 11 } } } }
    }
  });
}

function getMonthsAgo(ym, n) {
  const [y, m] = ym.split('-').map(Number);
  const d = new Date(y, m-1-n, 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

async function addExpense() {
  const date = document.getElementById('f-date').value;
  const amount = document.getElementById('f-amount').value;
  if (!date || !amount) return;

  const body = {
    date, amount: parseInt(amount),
    store: document.getElementById('f-store').value,
    category: document.getElementById('f-category').value,
    payment_method: document.getElementById('f-payment').value,
    memo: document.getElementById('f-memo').value
  };

  const res = await api('POST', 'expenses', body);
  if (res.ok || res.status === 201) {
    document.getElementById('f-amount').value = '';
    document.getElementById('f-memo').value = '';
    const toast = document.getElementById('add-toast');
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 2000);

    // Googleスプレッドシートにバックアップ
    try {
      await fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
    } catch(e) {
      console.log('バックアップエラー:', e);
    }
  } else {
    const err = document.getElementById('add-error');
    err.textContent = '❌ 保存に失敗しました';
    err.style.display = 'block';
    setTimeout(() => err.style.display = 'none', 3000);
  }
}

async function exportCSV(store) {
  const month = document.getElementById('sum-month').value;
  let q = `expenses?date=gte.${month}-01&date=lte.${month}-${String(getLastDay(month)).padStart(2,'0')}&order=date.asc`;
  if (store) q += `&store=eq.${encodeURIComponent(store)}`;
  const data = await api('GET', q);

  if (!data.length) {
    alert('該当データがありません');
    return;
  }

  const label = store || '全体';
  const [y, m] = month.split('-');

  // ヘッダー行
  const headers = ['日付', '店舗', 'カテゴリ', '金額', '支払方法', 'メモ'];
  const rows = data.map(e => [
    e.date,
    e.store,
    e.category,
    e.amount,
    e.payment_method,
    (e.memo || '').replace(/"/g, '""') // ダブルクォートのエスケープ
  ]);

  // 合計行
  const total = data.reduce((s, e) => s + e.amount, 0);
  rows.push(['', '', '合計', total, '', '']);

  // CSV文字列組み立て（カンマ・改行を含むセルは""で囲む）
  const csvContent = [headers, ...rows]
    .map(row => row.map(cell => {
      const str = String(cell);
      return /[",\n]/.test(str) ? `"${str}"` : str;
    }).join(','))
    .join('\r\n');

  // BOM付きUTF-8にしてExcelで文字化けしないようにする
  const bom = '\uFEFF';
  const blob = new Blob([bom + csvContent], { type: 'text/csv;charset=utf-8;' });

  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `経費_${label}_${y}${m}.csv`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}
